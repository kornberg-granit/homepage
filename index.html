<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kornberg Granit – Naturstein aus dem Fichtelgebirge.">
  <title>Kornberg Granit</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<main style="flex:1;display:flex;flex-direction:column">

  <section class="hero" aria-labelledby="hero-heading">
    <p class="hero__eyebrow">Naturstein aus dem Fichtelgebirge</p>
    <h1 class="hero__h1" id="hero-heading">Kornberg<br>Granit</h1>
  </section>

  <div class="hero-slider" aria-label="Bildergalerie">
    <div class="hero-slider__track">
      <img
        src="pictures/1.webp"
        alt="Kornberg Granit – Bild 1"
        class="hero-slider__slide hero-slider__slide--active"
        aria-hidden="false"
        width="720" height="450"
        loading="eager" fetchpriority="high">
      <img
        src="pictures/2.webp"
        alt="Kornberg Granit – Bild 2"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/3.webp"
        alt="Kornberg Granit – Bild 3"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/4.webp"
        alt="Kornberg Granit – Bild 4"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/5.webp"
        alt="Kornberg Granit – Bild 5"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/6.webp"
        alt="Kornberg Granit – Bild 6"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/7.webp"
        alt="Kornberg Granit – Bild 7"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
      <img
        src="pictures/8.webp"
        alt="Kornberg Granit – Bild 8"
        class="hero-slider__slide"
        aria-hidden="true"
        width="720" height="450"
        loading="lazy">
    </div>
    <div class="hero-slider__dots" role="group" aria-label="Bildnavigation">
      <button class="hero-slider__dot hero-slider__dot--active"
              aria-label="Bild 1" aria-current="true"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 2" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 3" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 4" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 5" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 6" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 7" aria-current="false"></button>
      <button class="hero-slider__dot"
              aria-label="Bild 8" aria-current="false"></button>
    </div>
  </div>

  <section class="contact" aria-labelledby="contact-heading">
    <h2 class="contact__heading" id="contact-heading">Sprechen Sie<br>uns an.</h2>

    <div id="email-container" aria-live="polite"></div>

    <noscript>
      <p class="noscript-email">
        info -at- kornberg-granit -punkt- de
      </p>
    </noscript>

    <span class="hp-trap" aria-hidden="true" tabindex="-1">
      do-not-contact@example.invalid
    </span>
  </section>

</main>

<footer class="site-footer">
  <span>&copy; <span id="footer-year"></span> Kornberg Granit</span>
  <nav aria-label="Rechtliches">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script>
(function () {
  var encoded = 'aW5mb0Brb3JuYmVyZy1ncmFuaXQuZGU=';
  var email = atob(encoded);

  var container = document.getElementById('email-container');
  if (container) {
    var link = document.createElement('a');
    link.href = 'mailto:' + email;
    link.textContent = email;
    link.className = 'email-link';
    link.setAttribute('aria-label', 'E-Mail an Kornberg Granit senden');
    container.appendChild(link);
  }

  var yearEl = document.getElementById('footer-year');
  if (yearEl) {
    yearEl.textContent = new Date().getFullYear();
  }

  var slides = document.querySelectorAll('.hero-slider__slide');
  var dots   = document.querySelectorAll('.hero-slider__dot');
  if (slides.length) {
    var current = 0;
    var timer;

    var goTo = function (index) {
      current = index;
      slides.forEach(function (s, i) {
        s.classList.toggle('hero-slider__slide--active', i === index);
        s.setAttribute('aria-hidden', i === index ? 'false' : 'true');
      });
      dots.forEach(function (d, i) {
        d.classList.toggle('hero-slider__dot--active', i === index);
        d.setAttribute('aria-current', i === index ? 'true' : 'false');
      });
    };

    var startTimer = function () {
      clearInterval(timer);
      timer = setInterval(function () {
        goTo((current + 1) % slides.length);
      }, 3000);
    };

    dots.forEach(function (dot, i) {
      dot.addEventListener('click', function () {
        goTo(i);
        startTimer();
      });
    });

    goTo(0);
    startTimer();
  }

  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, particles = [];
  var COUNT = 65, MAX_DIST = 155, SPEED = 0.35;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = Math.max(window.innerHeight, document.body.scrollHeight);
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * SPEED * 2;
    this.vy = (Math.random() - 0.5) * SPEED * 2;
    this.r  = Math.random() * 1.2 + 0.6;
  }

  Particle.prototype.update = function () {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  };

  function init() {
    particles = [];
    for (var i = 0; i < COUNT; i++) particles.push(new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function (p) { p.update(); });

    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MAX_DIST) {
          var a = (1 - d / MAX_DIST) * 0.28;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(180,172,160,' + a + ')';
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }

    particles.forEach(function (p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(170,162,150,0.5)';
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () { resize(); init(); }, 150);
  });
  resize();
  init();
  draw();
}());
</script>

</body>
</html>
