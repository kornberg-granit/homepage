<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Kornberg Granit – Naturstein aus dem Fichtelgebirge.">
  <title>Kornberg Granit</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<main style="flex:1;display:flex;flex-direction:column">

  <section class="hero" aria-labelledby="hero-heading">
    <p class="hero__eyebrow">Naturstein aus dem Fichtelgebirge</p>
    <h1 class="hero__h1" id="hero-heading">Kornberg<br>Granit</h1>
  </section>

  <div class="hero-slider" aria-label="Bildergalerie">
    <div class="hero-slider__track">
      <img
        src="Blockvermessung.jpg"
        alt="Granitblock bei der Vermessung im Steinbruch"
        class="hero-slider__slide hero-slider__slide--active"
        width="720" height="450"
        loading="eager" fetchpriority="high">
      <img
        src="kornberg_hell.jpg"
        alt="Kornberg Granit – helle Steinoberfläche"
        class="hero-slider__slide"
        width="720" height="450"
        loading="lazy">
      <img
        src="kornberg_gelb.jpg"
        alt="Kornberg Granit – gelbliche Steinoberfläche"
        class="hero-slider__slide"
        width="720" height="450"
        loading="lazy">
    </div>
    <div class="hero-slider__dots" role="tablist" aria-label="Bild wählen">
      <button class="hero-slider__dot hero-slider__dot--active"
              role="tab" aria-selected="true" aria-label="Bild 1" data-index="0"></button>
      <button class="hero-slider__dot"
              role="tab" aria-selected="false" aria-label="Bild 2" data-index="1"></button>
      <button class="hero-slider__dot"
              role="tab" aria-selected="false" aria-label="Bild 3" data-index="2"></button>
    </div>
  </div>

  <section class="contact" aria-labelledby="contact-heading">
    <h2 class="contact__heading" id="contact-heading">Sprechen Sie<br>uns an.</h2>


    <!-- Email injected here by JavaScript (see inline script below) -->
    <div id="email-container" aria-live="polite"></div>

    <!-- Fallback for users without JavaScript -->
    <noscript>
      <p class="noscript-email">
        info [at] kornberg-granit [punkt] de
      </p>
    </noscript>

    <!-- Honeypot: only visible to bots, ignored by real users -->
    <span class="hp-trap" aria-hidden="true" tabindex="-1">
      do-not-contact@example.invalid
    </span>
  </section>

</main>

<footer class="site-footer">
  <span>&copy; <span id="footer-year"></span> Kornberg Granit</span>
  <nav aria-label="Rechtliches">
    <a href="impressum.html">Impressum</a>
    <a href="datenschutz.html">Datenschutz</a>
  </nav>
</footer>

<script>
(function () {
  // ── Email spam protection ──────────────────────────────────────────────────
  // The address is Base64-encoded; never present as cleartext in this file.
  var encoded = 'aW5mb0Brb3JuYmVyZy1ncmFuaXQuZGU=';
  var email = atob(encoded);

  var container = document.getElementById('email-container');
  if (container) {
    var link = document.createElement('a');
    link.href = 'mailto:' + email;
    link.textContent = email;
    link.className = 'email-link';
    link.setAttribute('aria-label', 'E-Mail an Kornberg Granit senden');
    container.appendChild(link);
  }

  // ── Dynamic copyright year ─────────────────────────────────────────────────
  var yearEl = document.getElementById('footer-year');
  if (yearEl) {
    yearEl.textContent = new Date().getFullYear();
  }

  // ── Particle animation ─────────────────────────────────────────────────────
  var canvas = document.getElementById('particle-canvas');
  var ctx    = canvas.getContext('2d');
  var W, H, particles = [];
  var COUNT = 65, MAX_DIST = 155, SPEED = 0.35;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = Math.max(window.innerHeight, document.body.scrollHeight);
  }

  function Particle() {
    this.x  = Math.random() * W;
    this.y  = Math.random() * H;
    this.vx = (Math.random() - 0.5) * SPEED * 2;
    this.vy = (Math.random() - 0.5) * SPEED * 2;
    this.r  = Math.random() * 1.2 + 0.6;
  }

  Particle.prototype.update = function () {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  };

  function init() {
    particles = [];
    for (var i = 0; i < COUNT; i++) particles.push(new Particle());
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(function (p) { p.update(); });

    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var dx = particles[i].x - particles[j].x;
        var dy = particles[i].y - particles[j].y;
        var d  = Math.sqrt(dx * dx + dy * dy);
        if (d < MAX_DIST) {
          var a = (1 - d / MAX_DIST) * 0.28;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(180,172,160,' + a + ')';
          ctx.lineWidth = 0.7;
          ctx.stroke();
        }
      }
    }

    particles.forEach(function (p) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(170,162,150,0.5)';
      ctx.fill();
    });

    requestAnimationFrame(draw);
  }

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () { resize(); init(); }, 150);
  });
  resize();
  init();
  draw();
}());
</script>

</body>
</html>
